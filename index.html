<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dados Publicos BR - 95 Portais</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { 
            text-align: center; 
            color: white; 
            margin-bottom: 5px;
            font-size: 2em;
        }
        .subtitle { 
            text-align: center; 
            color: rgba(255,255,255,0.9); 
            margin-bottom: 20px;
            font-size: 1em;
        }
        
        .search-box {
            background: white;
            border-radius: 50px;
            padding: 5px;
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .search-box input {
            flex: 1;
            border: none;
            font-size: 16px;
            outline: none;
            padding: 12px 20px;
            border-radius: 40px;
        }
        .search-box button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .filter-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }
        .filter-btn:hover, .filter-btn.active {
            background: white;
            color: #667eea;
        }
        
        .stats { 
            color: white; 
            margin-bottom: 15px;
            font-size: 14px;
            text-align: center;
        }
        
        .results { display: grid; gap: 12px; }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .card h3 { 
            color: #333; 
            margin-bottom: 8px;
            font-size: 16px;
        }
        .card p { 
            color: #666; 
            font-size: 13px; 
            margin-bottom: 8px;
        }
        .card .meta {
            display: flex;
            gap: 8px;
            font-size: 11px;
            flex-wrap: wrap;
        }
        .card .meta span {
            background: #e3f2fd;
            color: #1976d2;
            padding: 3px 10px;
            border-radius: 10px;
        }
        .card a {
            color: #667eea;
            text-decoration: none;
            font-size: 13px;
            display: inline-block;
            margin-top: 8px;
        }
        
        .loading, .empty {
            text-align: center;
            padding: 40px;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dados Publicos BR</h1>
        <p class="subtitle" id="subtitle">Carregando...</p>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar cidade, estado..." autofocus>
            <button onclick="buscar()">Buscar</button>
        </div>
        
        <div class="filter-bar" id="filters">
            <button class="filter-btn active" onclick="filterUF('')">Todos</button>
            <button class="filter-btn" onclick="filterUF('RN')">RN</button>
            <button class="filter-btn" onclick="filterUF('AL')">AL</button>
            <button class="filter-btn" onclick="filterUF('CE')">CE</button>
            <button class="filter-btn" onclick="filterUF('PE')">PE</button>
            <button class="filter-btn" onclick="filterUF('PB')">PB</button>
        </div>
        
        <div class="stats" id="stats"></div>
        <div id="results"></div>
    </div>

    <script>
        const CSV_URL = 'https://raw.githubusercontent.com/bcasavilca/dados-publicos-br/main/data/catalogos.csv';
        let todosDados = [];
        let dadosFiltrados = [];
        
        async function carregarDados() {
            document.getElementById('results').innerHTML = '<div class="loading">Carregando...</div>';
            
            try {
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                const linhas = csvText.split('\n');
                const headers = linhas[0].split(',').map(h => h.trim());
                
                todosDados = [];
                for (let i = 1; i < linhas.length; i++) {
                    if (!linhas[i].trim()) continue;
                    const valores = parseCSVLine(linhas[i]);
                    const item = {};
                    headers.forEach((h, idx) => item[h] = valores[idx] || '');
                    if (item.Titulo && item.URL) todosDados.push(item);
                }
                
                dadosFiltrados = [...todosDados];
                document.getElementById('subtitle').textContent = `Busque em ${todosDados.length} portais de transparencia`;
                mostrarResultados(dadosFiltrados);
                
            } catch (error) {
                document.getElementById('results').innerHTML = '<div class="empty">Erro ao carregar dados</div>';
            }
        }
        
        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
                else current += char;
            }
            result.push(current.trim());
            return result;
        }
        
        function buscar() {
            const termo = document.getElementById('searchInput').value.toLowerCase();
            dadosFiltrados = termo ? todosDados.filter(p => 
                `${p.Titulo} ${p.Municipio} ${p.UF}`.toLowerCase().includes(termo)
            ) : [...todosDados];
            mostrarResultados(dadosFiltrados);
        }
        
        function filterUF(uf) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            dadosFiltrados = uf ? todosDados.filter(p => p.UF === uf) : [...todosDados];
            document.getElementById('searchInput').value = '';
            mostrarResultados(dadosFiltrados);
        }
        
        function mostrarResultados(resultados) {
            document.getElementById('stats').textContent = `${resultados.length} resultados`;
            
            if (resultados.length === 0) {
                document.getElementById('results').innerHTML = '<div class="empty">Nenhum resultado</div>';
                return;
            }
            
            document.getElementById('results').innerHTML = resultados.map(p => `
                <div class="card">
                    <h3>${p.Titulo}</h3>
                    <p>${p.Municipio || 'N/A'} - ${p.UF} | ${p.Esfera} | ${p.TipoFonte}</p>
                    <div class="meta">
                        <span>${p.UF}</span>
                        <span>${p.Qualidade}</span>
                        <span>${p.Formato}</span>
                    </div>
                    <a href="${p.URL}" target="_blank">Acessar portal</a>
                </div>
            `).join('');
        }
        
        document.getElementById('searchInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') buscar();
        });
        
        carregarDados();
    </script>
</body>
</html>
